<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Haul</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      width: 240px;
      padding: 16px;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #4f46e5;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    .tagline {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 16px;
    }
    .stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #f5f3ff;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .stat-label { font-size: 13px; color: #6b7280; }
    .stat-value { font-size: 20px; font-weight: 700; color: #4f46e5; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
      margin-bottom: 8px;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="logo">Haul</div>
  <div class="tagline">Shopping Comparison Tool</div>

  <div class="stat">
    <span class="stat-label">Items saved</span>
    <span class="stat-value" id="count">0</span>
  </div>

  <button class="btn btn-primary" id="open-tray-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
    </svg>
    Open Side Tray
  </button>

  <button class="btn btn-secondary" id="compare-btn" disabled>
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>
    </svg>
    Compare All
  </button>

  <script src="popup.js"></script>
</body>
</html>
