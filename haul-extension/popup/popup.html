<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Haul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #fafaf7;
      --surface:     #f2ede4;
      --border:      #ddd8cf;
      --primary:     #7a9e76;
      --primary-h:   #6a8c66;
      --text:        #3d3529;
      --muted:       #8a7e72;
      --price:       #b07d4a;
      --success:     #7a9e76;
      --badge-bg:    #e8f0e6;
      --transition:  0.15s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      color: var(--text);
      width: 280px;
      padding: 16px;
      line-height: 1.5;
    }

    /* ── Logo ───────────────────────────────────────── */
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.3px;
    }
    .logo-tagline {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Stat cards ──────────────────────────────────── */
    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .stat-value.savings { color: var(--price); }

    /* ── Thumbnail strip ─────────────────────────────── */
    #thumb-strip {
      display: none;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    #thumb-strip::-webkit-scrollbar { height: 3px; }
    #thumb-strip::-webkit-scrollbar-track { background: transparent; }
    #thumb-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    #thumb-strip.visible { display: flex; }
    .thumb-wrap {
      position: relative;
      flex-shrink: 0;
      width: 72px;
      display: flex;
      flex-direction: column;
      scroll-snap-align: start;
    }
    .thumb-img-box {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .thumb-img-box:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(122,158,118,0.2); }
    .thumb-img-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 4px;
    }
    .thumb-img-box .thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .thumb-name {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }
    .thumb-price {
      font-size: 11px;
      font-weight: 700;
      color: var(--price);
      text-align: center;
    }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background var(--transition);
      margin-bottom: 7px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn-primary   { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn:disabled  { opacity: 0.45; cursor: not-allowed; }
    .btn:disabled:hover { background: var(--surface); }
    .compare-hint {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      margin-top: -4px;
      margin-bottom: 7px;
    }
    .auth-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 7px 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .auth-row:hover { border-color: var(--primary); }
    .auth-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .auth-dot.connected { background: var(--success); }
    #auth-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
    }
    .auth-row.connected #auth-label { color: var(--text); }
  </style>
</head>
<body>
  <div class="logo-row">
    <span class="logo">Haul</span>
    <span class="logo-tagline">Shopping comparison</span>
  </div>

  <!-- Two stat cards side by side -->
  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-label">Saved</div>
      <div class="stat-value" id="count">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Savings</div>
      <div class="stat-value savings" id="savings-total">$0</div>
    </div>
  </div>

  <!-- Product thumbnail strip (all products, horizontally scrollable) -->
  <div id="thumb-strip"></div>

  <button class="btn btn-primary" id="post-haul-btn" disabled>
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    Post to Haul
  </button>

  <button class="btn btn-secondary" id="open-tray-btn">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
    </svg>
    <span id="tray-btn-label">Open Side Tray</span>
  </button>

  <button class="btn btn-secondary" id="compare-btn" disabled>
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>
    </svg>
    <span id="compare-btn-label">Compare All</span>
  </button>
  <div class="compare-hint" id="compare-hint" style="display:none;">Add 1 more item to compare</div>

  <div class="auth-row" id="auth-row">
    <div class="auth-dot" id="auth-dot"></div>
    <span id="auth-label">Connect to Haul</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
