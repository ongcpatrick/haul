<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haul</title>
  <style>
    :root {
      --bg:        #fafaf7;
      --surface:   #f2ede4;
      --border:    #ddd8cf;
      --primary:   #7a9e76;
      --primary-h: #6a8c66;
      --blue:      #93bedf;
      --text:      #3d3529;
      --muted:     #8a7e72;
      --price:     #b07d4a;
      --success:   #7a9e76;
      --danger:    #c97b7b;
      --badge-bg:  #e8f0e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.3px;
    }
    .badge {
      font-size: 11px;
      font-weight: 700;
      background: var(--badge-bg);
      color: var(--primary);
      padding: 2px 7px;
      border-radius: 10px;
    }
    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      padding: 6px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted);
      border-radius: 8px;
      transition: background 0.1s;
      display: flex;
      align-items: center;
    }
    .icon-btn:hover { background: var(--border); color: var(--text); }

    /* Content area (flex child between header and footer) */
    #content-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Product list */
    .product-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .product-list::-webkit-scrollbar { width: 4px; }
    .product-list::-webkit-scrollbar-track { background: transparent; }
    .product-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Product card */
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      position: relative;
      transition: box-shadow 0.15s;
    }
    .product-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .product-card--link { cursor: pointer; }
    .product-card--link:hover { box-shadow: 0 2px 12px rgba(122,158,118,0.2); border-color: var(--primary); }
    .product-img {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--border);
      flex-shrink: 0;
    }
    .product-img-placeholder {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--border), #ccc9c0);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .product-site {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .price-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .price {
      font-size: 14px;
      font-weight: 700;
      color: var(--price);
    }
    .original-price {
      font-size: 12px;
      color: var(--muted);
      text-decoration: line-through;
    }
    .badge-drop {
      font-size: 10px;
      font-weight: 700;
      background: var(--badge-bg);
      color: var(--success);
      padding: 1px 6px;
      border-radius: 6px;
    }
    .badge-sale {
      font-size: 10px;
      font-weight: 700;
      background: #fdf0e0;
      color: var(--price);
      padding: 1px 6px;
      border-radius: 6px;
    }
    .category-row { margin-top: 4px; }
    .badge-category {
      font-size: 10px;
      font-weight: 600;
      background: var(--badge-bg);
      color: var(--primary);
      padding: 1px 7px;
      border-radius: 6px;
    }
    .remove-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      border: none;
      background: var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .product-card:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { background: #f0d5d5; color: var(--danger); }

    /* Footer */
    .footer {
      padding: 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-compare {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .btn-compare:hover { background: var(--primary-h); }
    .btn-compare:disabled { background: var(--muted); cursor: not-allowed; }
    .btn-clear {
      width: 100%;
      padding: 8px;
      background: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.1s;
    }
    .btn-clear:hover { background: var(--border); color: var(--danger); }

    /* Empty state */
    .empty-state {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .empty-icon {
      width: 64px;
      height: 64px;
      background: var(--badge-bg);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: var(--primary);
    }
    .empty-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="header-logo">Haul</span>
      <span class="badge" id="count-badge">0 items</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refresh-btn" title="Refresh">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="content-area">
    <!-- Filled by JS -->
  </div>

  <div class="footer" id="footer" style="display:none;">
    <button class="btn-compare" id="compare-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
        <line x1="15" y1="3" x2="15" y2="21"/>
      </svg>
      Compare All
    </button>
    <button class="btn-clear" id="clear-btn">Clear All</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
