<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #fafaf7;
      --surface:     #f2ede4;
      --border:      #ddd8cf;
      --primary:     #7a9e76;
      --primary-h:   #6a8c66;
      --blue:        #93bedf;
      --text:        #3d3529;
      --muted:       #8a7e72;
      --price:       #b07d4a;
      --success:     #7a9e76;
      --danger:      #c97b7b;
      --badge-bg:    #e8f0e6;
      --radius-card: 14px;
      --transition:  0.15s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-row {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.3px;
    }
    .count-badge {
      font-size: 11px;
      font-weight: 700;
      background: var(--badge-bg);
      color: var(--primary);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      padding: 6px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted);
      border-radius: 8px;
      transition: background var(--transition);
      display: flex;
      align-items: center;
    }
    .icon-btn:hover { background: var(--border); color: var(--text); }

    /* ── Folder tabs (second header row) ─────────────── */
    .folder-row {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 0 12px 10px;
      overflow-x: auto;
    }
    .folder-row::-webkit-scrollbar { display: none; }
    .folder-row.visible { display: flex; }
    .folder-tab {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      background: var(--bg);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 1px 3px rgba(61,53,41,0.05);
    }
    .folder-tab.active {
      background: #fff;
      border-color: var(--primary);
      color: var(--primary);
    }
    .folder-tab:not(.active):hover { color: var(--text); background: var(--surface); }
    .folder-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .new-folder-btn {
      padding: 3px 9px;
      border-radius: 20px;
      border: 1.5px dashed var(--border);
      background: none;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
    }
    .new-folder-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ── Content area ────────────────────────────────── */
    #content-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Apple-style animations ─────────────────────── */
    @keyframes card-in {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    @keyframes card-out {
      to { opacity: 0; transform: scale(0.93) translateY(5px); }
    }
    @keyframes empty-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-once {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    /* ── Product list ────────────────────────────────── */
    .product-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .product-list::-webkit-scrollbar { width: 4px; }
    .product-list::-webkit-scrollbar-track { background: transparent; }
    .product-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Product card ────────────────────────────────── */
    .product-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-card);
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      position: relative;
      transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      animation: card-in 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .product-card[data-url]:hover { box-shadow: 0 2px 10px rgba(61,53,41,0.09); border-color: var(--primary); transform: translateY(-1px); }
    .product-card:not([data-url]):hover { box-shadow: 0 2px 10px rgba(61,53,41,0.09); border-color: #ccc9c0; }
    .product-card.removing { animation: card-out 0.22s ease-in both; pointer-events: none; }

    /* Image */
    .product-img-wrap {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      background: linear-gradient(135deg, #ede8df, #ddd8cf);
      flex-shrink: 0;
      overflow: hidden;
    }
    .product-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 4px;
    }
    .product-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }

    /* Info */
    .product-info { flex: 1; min-width: 0; padding-right: 28px; }
    .product-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 3px;
    }
    .product-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 5px;
    }
    .product-site {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .folder-dots { display: flex; gap: 3px; align-items: center; }
    .price-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .price {
      font-size: 15px;
      font-weight: 700;
      color: var(--price);
      letter-spacing: -0.01em;
    }
    .original-price {
      font-size: 12px;
      color: var(--muted);
      text-decoration: line-through;
    }
    .badge-drop {
      font-size: 10px;
      font-weight: 700;
      background: var(--badge-bg);
      color: var(--success);
      padding: 1px 6px;
      border-radius: 6px;
    }

    /* Always-visible action buttons */
    .card-actions-col {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
      align-self: flex-start;
    }
    .action-btn {
      width: 26px;
      height: 26px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      transition: all var(--transition);
    }
    .action-btn:hover { border-color: currentColor; }
    .remove-action:hover { color: var(--danger); border-color: var(--danger); background: #fdf0ef; }
    .assign-action:hover { color: var(--primary); border-color: var(--primary); background: var(--badge-bg); }

    /* ── Footer ─────────────────────────────────────── */
    .footer {
      padding: 10px 12px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .btn-compare {
      width: 100%;
      padding: 11px 12px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background var(--transition);
      letter-spacing: -0.01em;
    }
    .btn-compare:hover { background: var(--primary-h); }
    .btn-compare:active { transform: scale(0.96); transition: transform 0.1s ease !important; }
    .btn-compare:disabled { background: var(--muted); cursor: not-allowed; }
    .btn-compare.pulse { animation: pulse-once 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .btn-clear {
      display: block;
      width: 100%;
      padding: 6px;
      margin-top: 4px;
      background: none;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      text-align: center;
      transition: color var(--transition), background var(--transition);
    }
    .btn-clear:hover { color: var(--danger); background: #fdf0ef; }

    /* ── Empty state ─────────────────────────────────── */
    .empty-state {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      animation: empty-in 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    .empty-icon {
      width: 64px; height: 64px;
      background: var(--badge-bg);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      color: var(--primary);
    }
    .empty-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .empty-desc  { font-size: 13px; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-row">
      <div class="header-left">
        <span class="header-logo">Haul</span>
        <span class="count-badge" id="count-badge">0 items</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="refresh-btn" title="Refresh">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Folder tabs appear here when folders exist -->
    <div class="folder-row" id="folder-row"></div>
  </div>

  <div id="content-area"><!-- Filled by JS --></div>

  <div class="footer" id="footer" style="display:none;">
    <button class="btn-compare" id="compare-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
        <line x1="15" y1="3" x2="15" y2="21"/>
      </svg>
      <span id="compare-btn-label">Compare All</span>
    </button>
    <button class="btn-clear" id="clear-btn">Clear all items</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
