<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haul</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 14px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-logo {
      font-size: 16px;
      font-weight: 700;
      color: #4f46e5;
      letter-spacing: -0.3px;
    }
    .badge {
      font-size: 11px;
      font-weight: 700;
      background: #ede9fe;
      color: #4f46e5;
      padding: 2px 7px;
      border-radius: 10px;
    }
    .header-actions { display: flex; gap: 4px; }
    .icon-btn {
      padding: 6px;
      border: none;
      background: none;
      cursor: pointer;
      color: #6b7280;
      border-radius: 8px;
      transition: background 0.1s;
      display: flex;
      align-items: center;
    }
    .icon-btn:hover { background: #f3f4f6; color: #1a1a1a; }

    /* Product list */
    .product-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .product-list::-webkit-scrollbar { width: 4px; }
    .product-list::-webkit-scrollbar-track { background: transparent; }
    .product-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    /* Product card */
    .product-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      position: relative;
      transition: box-shadow 0.15s;
    }
    .product-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .product-img {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      object-fit: cover;
      background: #f3f4f6;
      flex-shrink: 0;
    }
    .product-img-placeholder {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .product-site {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    .price-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .price {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .original-price {
      font-size: 12px;
      color: #9ca3af;
      text-decoration: line-through;
    }
    .badge-drop {
      font-size: 10px;
      font-weight: 700;
      background: #d1fae5;
      color: #065f46;
      padding: 1px 6px;
      border-radius: 6px;
    }
    .badge-sale {
      font-size: 10px;
      font-weight: 700;
      background: #fef3c7;
      color: #92400e;
      padding: 1px 6px;
      border-radius: 6px;
    }
    .remove-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      border: none;
      background: #f3f4f6;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .product-card:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { background: #fee2e2; color: #dc2626; }

    /* Footer */
    .footer {
      padding: 12px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-compare {
      width: 100%;
      padding: 10px;
      background: #4f46e5;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .btn-compare:hover { background: #4338ca; }
    .btn-compare:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-clear {
      width: 100%;
      padding: 8px;
      background: none;
      color: #6b7280;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.1s;
    }
    .btn-clear:hover { background: #f3f4f6; color: #ef4444; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    .empty-icon {
      width: 64px;
      height: 64px;
      background: #ede9fe;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: #4f46e5;
    }
    .empty-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .empty-desc {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="header-logo">Haul</span>
      <span class="badge" id="count-badge">0 items</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refresh-btn" title="Refresh">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="content-area">
    <!-- Filled by JS -->
  </div>

  <div class="footer" id="footer" style="display:none;">
    <button class="btn-compare" id="compare-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
        <line x1="15" y1="3" x2="15" y2="21"/>
      </svg>
      Compare All
    </button>
    <button class="btn-clear" id="clear-btn">Clear All</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
