<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Haul — Compare Products</title>
  <style>
    :root {
      --bg:          #fafaf7;
      --surface:     #f2ede4;
      --border:      #ddd8cf;
      --primary:     #7a9e76;
      --primary-h:   #6a8c66;
      --blue:        #93bedf;
      --text:        #3d3529;
      --muted:       #8a7e72;
      --price:       #b07d4a;
      --success:     #7a9e76;
      --danger:      #c97b7b;
      --badge-bg:    #e8f0e6;
      --radius-card: 16px;
      --radius-btn:  10px;
      --shadow-card: 0 2px 12px rgba(61,53,41,0.08);
      --shadow-elev: 0 4px 24px rgba(61,53,41,0.12);
      --transition:  0.15s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      /* account for sticky share bar */
      padding-bottom: 64px;
    }

    /* ── Header ────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .header-left p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
      max-width: 500px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .close-icon-btn {
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: background var(--transition), color var(--transition);
      flex-shrink: 0;
    }
    .close-icon-btn:hover { background: var(--border); color: var(--text); }

    /* ── Filter bar ────────────────────────────────── */
    .filters {
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 5px 13px;
      border: 1.5px solid transparent;
      border-radius: 20px;
      background: var(--bg);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      white-space: nowrap;
      transition: all var(--transition);
      box-shadow: 0 1px 3px rgba(61,53,41,0.06);
    }
    .filter-btn.active {
      background: #fff;
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 1px 6px rgba(122,158,118,0.18);
    }
    .filter-btn:not(.active):hover {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }
    .savings-badge {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 700;
      color: var(--success);
      background: var(--badge-bg);
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Empty state ───────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    .empty-icon {
      width: 72px; height: 72px;
      background: var(--badge-bg);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      margin-bottom: 20px;
    }
    .empty h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty p  { font-size: 14px; color: var(--muted); }

    /* ── Card grid (≤4 products) ───────────────────── */
    .card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 24px;
    }
    .product-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      flex: 1 1 220px;
      max-width: 280px;
      min-width: 200px;
      overflow: hidden;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .product-card:hover {
      box-shadow: var(--shadow-elev);
      transform: translateY(-2px);
    }
    .card-winner { border-color: var(--price); }
    .card-winner-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--price);
      background: #fde8c8;
      padding: 6px 12px;
      letter-spacing: 0.02em;
    }
    .card-img-wrap {
      position: relative;
      background: linear-gradient(135deg, #ede8df, #ddd8cf);
      height: 200px;
      overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
    }
    .card-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 8px;
    }
    .badge-drop  { background: var(--success); color: #fff; }
    .badge-sale  { background: var(--price);   color: #fff; }
    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }
    .card-site {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .card-price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-price {
      font-size: 28px;
      font-weight: 700;
      color: var(--price);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .card-orig {
      font-size: 13px;
      color: var(--muted);
      text-decoration: line-through;
    }
    .card-savings {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--success);
      background: var(--badge-bg);
      padding: 3px 8px;
      border-radius: 8px;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 4px;
    }
    .card-view-btn {
      flex: 1;
      padding: 9px 12px;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: filter var(--transition);
    }
    .card-view-btn:hover { filter: brightness(0.92); }
    .card-remove-btn {
      width: 36px;
      height: 36px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-btn);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .card-remove-btn:hover { background: #f0d5d5; border-color: var(--danger); color: var(--danger); }

    /* ── Table (5+ products) ───────────────────────── */
    .table-wrapper { padding: 24px; overflow-x: auto; }
    table {
      width: auto;
      min-width: min(100%, 480px);
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    th, td { padding: 12px 16px; text-align: left; }
    thead tr { border-bottom: 1px solid var(--border); background: var(--bg); }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg); }
    .row-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      width: 90px;
    }
    .product-col-header {
      width: 220px; min-width: 220px; max-width: 220px;
      vertical-align: top; position: relative;
    }
    .product-col-header .remove-col-btn {
      position: absolute; top: 0; right: 0;
      width: 24px; height: 24px;
      background: var(--border); border: none; border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); opacity: 0; transition: opacity var(--transition);
    }
    th:hover .remove-col-btn { opacity: 1; }
    .remove-col-btn:hover { background: #f0d5d5; color: var(--danger); }
    .product-img-cell {
      width: 188px; height: 188px;
      background: linear-gradient(135deg, var(--border), #ccc9c0);
      border-radius: 10px; overflow: hidden; margin-bottom: 8px;
      position: relative;
    }
    .product-img-cell img {
      width: 100%; height: 100%;
      object-fit: contain; padding: 8px;
    }
    .price-drop-badge, .sale-badge {
      position: absolute; top: 6px; left: 6px;
      font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 6px;
    }
    .price-drop-badge { background: var(--success); color: #fff; }
    .sale-badge       { background: var(--price);   color: #fff; }
    td.data-cell { font-size: 13px; color: var(--text); vertical-align: middle; }
    .price-display { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .price-main { font-size: 18px; font-weight: 700; color: var(--price); }
    .price-orig { font-size: 12px; color: var(--muted); text-decoration: line-through; }
    .go-btn {
      width: 100%; padding: 8px;
      background: var(--blue); color: #fff;
      font-size: 13px; font-weight: 600;
      border: none; border-radius: 8px;
      cursor: pointer; transition: filter var(--transition);
    }
    .go-btn:hover { filter: brightness(0.92); }
    .col-winner { background: #fdf5e8 !important; }
    .winner-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700; color: var(--price);
      background: #fde8c8; padding: 2px 8px; border-radius: 6px; margin-bottom: 6px;
    }

    /* ── Ask Claude FAB ────────────────────────────── */
    #claude-fab {
      position: fixed;
      bottom: 76px;
      right: 24px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--blue));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(122,158,118,0.35);
      z-index: 30;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    #claude-fab:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 20px rgba(122,158,118,0.45);
    }
    #claude-fab:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    #claude-fab-tooltip {
      position: fixed;
      bottom: 139px;
      right: 24px;
      background: var(--text);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity var(--transition), transform var(--transition);
      z-index: 30;
    }
    #claude-fab:hover + #claude-fab-tooltip { opacity: 1; transform: translateY(0); }

    /* ── Sticky share bar ──────────────────────────── */
    #share-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
      z-index: 20;
      box-shadow: 0 -2px 12px rgba(61,53,41,0.06);
    }
    #share-bar-btn {
      flex: 1;
      height: 36px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background var(--transition);
    }
    #share-bar-btn:hover { background: var(--primary-h); }
    .share-quick-btn {
      width: 36px;
      height: 36px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-btn);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .share-quick-btn:hover { border-color: var(--primary); background: var(--badge-bg); transform: translateY(-1px); }

    /* ── Claude panel ──────────────────────────────── */
    #claude-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 2px solid var(--primary);
      border-radius: 16px 16px 0 0;
      padding: 20px 28px 24px;
      box-shadow: 0 -8px 32px rgba(122,158,118,0.15);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 50;
      max-height: 50vh;
      overflow-y: auto;
    }
    #claude-panel.open { transform: translateY(0); }
    .claude-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .claude-panel-title {
      font-size: 14px; font-weight: 700; color: var(--primary);
      display: flex; align-items: center; gap: 6px;
    }
    .claude-close-btn {
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 4px; border-radius: 6px; display: flex; align-items: center;
    }
    .claude-close-btn:hover { background: var(--border); color: var(--text); }
    .claude-loading {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 14px;
    }
    .claude-spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .claude-summary { font-size: 14px; line-height: 1.6; color: var(--text); margin-bottom: 12px; }
    .claude-insights { display: flex; flex-direction: column; gap: 6px; }
    .claude-insight {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 13px; color: var(--text);
    }
    .claude-insight::before {
      content: '→'; color: var(--primary); font-weight: 700;
      flex-shrink: 0; margin-top: 1px;
    }
    .claude-error { font-size: 13px; color: var(--danger); }

    /* ── Share modal ───────────────────────────────── */
    #share-overlay {
      position: fixed; inset: 0;
      background: rgba(61,53,41,0.4);
      backdrop-filter: blur(3px);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #share-overlay.open { opacity: 1; pointer-events: all; }
    #share-modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 28px 32px;
      width: 100%; max-width: 520px;
      box-shadow: 0 -8px 40px rgba(61,53,41,0.18);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    #share-overlay.open #share-modal { transform: translateY(0); }
    .share-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .share-modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .share-close-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--border); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: background var(--transition);
    }
    .share-close-btn:hover { background: #ccc9c0; color: var(--text); }
    .share-url-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 10px 14px; margin-bottom: 20px;
    }
    .share-url-text {
      flex: 1; font-size: 13px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .share-copy-btn {
      padding: 6px 14px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
      cursor: pointer; flex-shrink: 0; transition: background var(--transition);
    }
    .share-copy-btn:hover { background: var(--primary-h); }
    .share-copy-btn.copied { background: var(--success); }
    .share-platforms { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .share-platform-btn {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 8px; border-radius: 14px; border: 1.5px solid var(--border);
      background: var(--bg); cursor: pointer; transition: all 0.12s;
      font-size: 11px; font-weight: 600; color: var(--muted);
    }
    .share-platform-btn:hover {
      border-color: var(--primary); color: var(--primary);
      background: var(--badge-bg); transform: translateY(-1px);
    }
    .share-platform-icon { font-size: 22px; line-height: 1; }
    .share-native-btn {
      width: 100%; padding: 13px 16px; margin-bottom: 16px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 12px; cursor: pointer;
      font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background var(--transition);
    }
    .share-native-btn:hover { background: var(--primary-h); }
    .share-generating {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 14px; padding: 8px 0;
    }

    /* ── Toast ─────────────────────────────────────── */
    #copy-toast {
      position: fixed; bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--text); color: #fff;
      padding: 10px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 300;
    }
    #copy-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <!-- Header: title + subtitle + close icon only -->
  <div class="header">
    <div class="header-left">
      <h1>Compare Products</h1>
      <p id="header-sub">Loading…</p>
    </div>
    <button class="close-icon-btn" id="close-btn" title="Close">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Filter pills + savings total -->
  <div class="filters" id="filters-bar"></div>

  <!-- Product content area (cards or table) -->
  <div id="main-content"></div>

  <div id="copy-toast">✓ Copied to clipboard</div>

  <!-- Ask Claude FAB -->
  <button id="claude-fab" title="Ask Claude">✨</button>
  <div id="claude-fab-tooltip">Ask Claude for insights</div>

  <!-- Sticky share bar -->
  <div id="share-bar">
    <button id="share-bar-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      Share this comparison
    </button>
    <button class="share-quick-btn" id="quick-wa"  title="WhatsApp">💬</button>
    <button class="share-quick-btn" id="quick-email" title="Email">📧</button>
    <button class="share-quick-btn" id="quick-x"   title="Post on X">𝕏</button>
  </div>

  <!-- Share modal -->
  <div id="share-overlay">
    <div id="share-modal">
      <div class="share-modal-header">
        <span class="share-modal-title">Share your haul</span>
        <button class="share-close-btn" id="share-modal-close">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="share-modal-body">
        <div class="share-generating">
          <div class="claude-spinner"></div>
          Generating link…
        </div>
      </div>
    </div>
  </div>

  <!-- Claude panel (slides up from bottom) -->
  <div id="claude-panel">
    <div class="claude-panel-header">
      <span class="claude-panel-title">✨ Claude's Take</span>
      <button class="claude-close-btn" id="claude-panel-close">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="claude-panel-body">
      <div class="claude-loading">
        <div class="claude-spinner"></div>
