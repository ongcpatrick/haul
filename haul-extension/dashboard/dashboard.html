<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Haul — Compare Products</title>
  <style>
    :root {
      --bg:        #fafaf7;
      --surface:   #f2ede4;
      --border:    #ddd8cf;
      --primary:   #7a9e76;
      --primary-h: #6a8c66;
      --blue:      #93bedf;
      --text:      #3d3529;
      --muted:     #8a7e72;
      --price:     #b07d4a;
      --success:   #7a9e76;
      --danger:    #c97b7b;
      --badge-bg:  #e8f0e6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left h1 { font-size: 18px; font-weight: 700; color: var(--text); }
    .header-left p { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .header-right { display: flex; gap: 8px; align-items: center; }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }
    .btn-ghost { background: var(--border); color: var(--text); }
    .btn-ghost:hover { background: #ccc9c0; }

    /* Filters */
    .filters {
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }
    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      white-space: nowrap;
      transition: all 0.1s;
    }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .filter-btn:not(.active):hover { background: var(--surface); }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    .empty-icon {
      width: 72px; height: 72px;
      background: var(--badge-bg);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      margin-bottom: 20px;
    }
    .empty h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: var(--muted); }

    /* Comparison table */
    .table-wrapper {
      padding: 24px;
      overflow-x: auto;
    }
    table {
      width: auto;
      min-width: min(100%, 480px);
      border-collapse: collapse;
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
    }
    thead tr {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg); }

    .row-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      width: 100px;
    }

    /* Product column header */
    .product-col-header {
      width: 220px;
      min-width: 220px;
      max-width: 220px;
      vertical-align: top;
      position: relative;
    }
    .product-col-header .remove-col-btn {
      position: absolute;
      top: 0;
      right: 0;
      width: 24px;
      height: 24px;
      background: var(--border);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.15s;
    }
    th:hover .remove-col-btn { opacity: 1; }
    .remove-col-btn:hover { background: #f0d5d5; color: var(--danger); }

    .product-img-cell {
      width: 188px;
      height: 188px;
      background: linear-gradient(135deg, var(--border), #ccc9c0);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
      position: relative;
    }
    .product-img-cell img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }
    .price-drop-badge, .sale-badge, .stock-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
    }
    .price-drop-badge { background: var(--success); color: #fff; }
    .sale-badge { background: var(--price); color: #fff; }

    /* Cell data */
    td.data-cell {
      font-size: 13px;
      color: var(--text);
      vertical-align: middle;
    }
    .price-display {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
    }
    .price-main { font-size: 18px; font-weight: 700; color: var(--price); }
    .price-orig { font-size: 12px; color: var(--muted); text-decoration: line-through; }

    .go-btn {
      width: 100%;
      padding: 8px;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .go-btn:hover { filter: brightness(0.92); }

    /* Ask Claude button */
    .btn-claude {
      background: linear-gradient(135deg, var(--primary), var(--blue));
      color: #fff;
    }
    .btn-claude:hover { filter: brightness(0.95); }
    .btn-claude:disabled { opacity: 0.6; cursor: not-allowed; filter: none; }

    /* Winner badge on column header */
    .col-winner { background: #fdf5e8 !important; }
    .winner-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--price);
      background: #fde8c8;
      padding: 2px 8px;
      border-radius: 6px;
      margin-bottom: 6px;
    }

    /* Claude panel */
    #claude-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 2px solid var(--primary);
      border-radius: 16px 16px 0 0;
      padding: 20px 28px 24px;
      box-shadow: 0 -8px 32px rgba(122,158,118,0.15);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 50;
      max-height: 50vh;
      overflow-y: auto;
    }
    #claude-panel.open { transform: translateY(0); }
    .claude-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .claude-panel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .claude-close-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
    }
    .claude-close-btn:hover { background: var(--border); color: var(--text); }
    .claude-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }
    .claude-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .claude-summary {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 12px;
    }
    .claude-insights {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .claude-insight {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
    }
    .claude-insight::before {
      content: '→';
      color: var(--primary);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .claude-error {
      font-size: 13px;
      color: var(--danger);
    }

    /* Share modal */
    #share-overlay {
      position: fixed; inset: 0;
      background: rgba(61,53,41,0.4);
      backdrop-filter: blur(3px);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #share-overlay.open { opacity: 1; pointer-events: all; }
    #share-modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 28px 32px;
      width: 100%; max-width: 520px;
      box-shadow: 0 -8px 40px rgba(61,53,41,0.18);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    #share-overlay.open #share-modal { transform: translateY(0); }
    .share-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .share-modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .share-close-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--border); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: background 0.1s;
    }
    .share-close-btn:hover { background: #ccc9c0; color: var(--text); }
    .share-url-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 10px 14px; margin-bottom: 20px;
    }
    .share-url-text {
      flex: 1; font-size: 13px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .share-copy-btn {
      padding: 6px 14px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: 12px; font-weight: 700;
      cursor: pointer; flex-shrink: 0; transition: background 0.15s;
    }
    .share-copy-btn:hover { background: var(--primary-h); }
    .share-copy-btn.copied { background: var(--success); }
    .share-platforms {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    .share-platform-btn {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 8px; border-radius: 14px; border: 1.5px solid var(--border);
      background: var(--bg); cursor: pointer; transition: all 0.12s;
      font-size: 11px; font-weight: 600; color: var(--muted);
    }
    .share-platform-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--badge-bg); transform: translateY(-1px); }
    .share-platform-icon { font-size: 22px; line-height: 1; }
    .share-native-btn {
      width: 100%; padding: 13px 16px; margin-bottom: 16px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 12px; cursor: pointer;
      font-size: 14px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.15s;
    }
    .share-native-btn:hover { background: var(--primary-h); }
    .share-generating {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 14px; padding: 8px 0;
    }

    /* Simple toast for copy confirmation */
    #copy-toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--text); color: #fff;
      padding: 10px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 300;
    }
    #copy-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1>Compare Products</h1>
      <p id="header-sub">Loading…</p>
    </div>
    <div class="header-right">
      <button class="btn btn-claude" id="ask-claude-btn">
        ✨ Ask Claude
      </button>
      <button class="btn btn-ghost" id="share-btn">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Share
      </button>
      <button class="btn btn-primary" id="close-btn">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        Close
      </button>
    </div>
  </div>

  <div class="filters" id="filters-bar"></div>
  <div id="main-content"></div>
  <div id="copy-toast">✓ Copied to clipboard</div>

  <!-- Share modal -->
  <div id="share-overlay">
    <div id="share-modal">
      <div class="share-modal-header">
        <span class="share-modal-title">Share your haul</span>
        <button class="share-close-btn" id="share-modal-close">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="share-modal-body">
        <div class="share-generating">
          <div class="claude-spinner"></div>
          Generating link…
        </div>
      </div>
    </div>
  </div>

  <div id="claude-panel">
    <div class="claude-panel-header">
      <span class="claude-panel-title">✨ Claude's Take</span>
      <button class="claude-close-btn" id="claude-panel-close">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="claude-panel-body">
      <div class="claude-loading">
        <div class="claude-spinner"></div>
        Analyzing your haul…
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
