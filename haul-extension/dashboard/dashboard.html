<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Haul — Compare Products</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #f8f7f4;
      --surface:     #f0ebe0;
      --surface-2:   #e8e2d6;
      --border:      #d8d2c8;
      --border-2:    #c8c2b6;
      --primary:     #6b9468;
      --primary-h:   #5c8259;
      --primary-faint: #eaf2e9;
      --blue:        #7aafd4;
      --text:        #2e2820;
      --text-2:      #6b6158;
      --price:       #a87040;
      --success:     #6b9468;
      --danger:      #c07070;
      --card-bg:     #faf8f4;
      --radius-card: 18px;
      --radius-btn:  10px;
      --shadow-sm:   0 1px 4px rgba(46,40,32,0.07);
      --shadow-md:   0 4px 16px rgba(46,40,32,0.10);
      --shadow-lg:   0 8px 32px rgba(46,40,32,0.13);
      --t:           0.15s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      font-size: 14px;
      padding-bottom: 64px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { min-width: 0; }
    .header-left h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .header-left p {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 520px;
    }
    .close-btn {
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      transition: background var(--t), color var(--t);
      flex-shrink: 0;
      margin-left: 16px;
    }
    .close-btn:hover { background: var(--surface-2); color: var(--text); }

    /* ── Filter bar ──────────────────────────────────── */
    .filters {
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 5px 13px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-2);
      white-space: nowrap;
      transition: all var(--t);
      font-family: inherit;
    }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      font-weight: 600;
    }
    .filter-btn:not(.active):hover {
      background: var(--surface-2);
      border-color: var(--border-2);
      color: var(--text);
    }
    .savings-pill {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      color: var(--success);
      background: var(--primary-faint);
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    /* ── Empty state ──────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    .empty-icon {
      width: 68px; height: 68px;
      background: var(--primary-faint);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      margin-bottom: 20px;
    }
    .empty h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.01em; }
    .empty p  { font-size: 13px; color: var(--text-2); }

    /* ── Card grid ─────────────────────────────────────── */
    .card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 24px;
      align-items: flex-start;
    }
    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      flex: 1 1 220px;
      max-width: 272px;
      min-width: 200px;
      overflow: hidden;
      transition: box-shadow var(--t), transform var(--t);
    }
    .product-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .card-winner {
      border-color: var(--price);
      box-shadow: 0 0 0 2px rgba(168,112,64,0.15), var(--shadow-sm);
    }
    .card-winner-bar {
      background: var(--price);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 12px;
    }
    .card-img-wrap {
      position: relative;
      background: var(--surface);
      height: 196px;
      overflow: hidden;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 16px;
    }
    .card-drop-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 8px;
      background: var(--success);
      color: #fff;
      letter-spacing: 0.02em;
    }
    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .card-site {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.10em;
    }
    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      letter-spacing: -0.01em;
    }
    .card-price-block { margin-top: 2px; }
    .card-price {
      font-size: 26px;
      font-weight: 700;
      color: var(--price);
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .card-price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 2px;
    }
    .card-orig {
      font-size: 12px;
      color: var(--text-2);
      text-decoration: line-through;
    }
    .card-savings {
      font-size: 11px;
      font-weight: 600;
      color: var(--success);
      background: var(--primary-faint);
      padding: 2px 7px;
      border-radius: 6px;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .card-view-btn {
      flex: 1;
      height: 36px;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: filter var(--t);
      font-family: inherit;
      letter-spacing: -0.01em;
    }
    .card-view-btn:hover { filter: brightness(0.92); }
    .card-view-btn:disabled { opacity: 0.35; cursor: default; filter: none; }
    .card-remove-btn {
      width: 36px;
      height: 36px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      flex-shrink: 0;
      transition: all var(--t);
    }
    .card-remove-btn:hover { background: #f5e8e8; border-color: var(--danger); color: var(--danger); }

    /* ── Table (5+ products) ───────────────────────────── */
    .table-wrapper { padding: 24px; overflow-x: auto; }
    table {
      width: auto;
      min-width: min(100%, 480px);
      border-collapse: collapse;
      background: var(--card-bg);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }
    th, td { padding: 12px 16px; text-align: left; }
    thead tr { border-bottom: 1px solid var(--border); background: var(--surface); }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface); }
    .row-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.10em;
      white-space: nowrap;
      width: 80px;
    }
    .product-col-header {
      width: 220px; min-width: 220px; max-width: 220px;
      vertical-align: top; position: relative;
    }
    .remove-col-btn {
      position: absolute; top: 0; right: 0;
      width: 22px; height: 22px;
      background: var(--surface-2); border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-2); opacity: 0; transition: opacity var(--t);
    }
    th:hover .remove-col-btn { opacity: 1; }
    .remove-col-btn:hover { background: #f5e8e8; color: var(--danger); }
    .product-img-cell {
      width: 188px; height: 188px;
      background: var(--surface);
      border-radius: 10px; overflow: hidden; margin-bottom: 8px;
      position: relative;
    }
    .product-img-cell img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
    .price-drop-badge {
      position: absolute; top: 6px; left: 6px;
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px;
      background: var(--success); color: #fff;
    }
    td.data-cell { font-size: 13px; color: var(--text); vertical-align: middle; }
    .price-display { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .price-main { font-size: 17px; font-weight: 700; color: var(--price); }
    .price-orig { font-size: 12px; color: var(--text-2); text-decoration: line-through; }
    .go-btn {
      width: 100%; padding: 8px;
      background: var(--blue); color: #fff;
      font-size: 12px; font-weight: 600;
      border: none; border-radius: 8px;
      cursor: pointer; transition: filter var(--t);
      font-family: inherit;
    }
    .go-btn:hover { filter: brightness(0.92); }
    .col-winner { background: rgba(168,112,64,0.04) !important; }
    .winner-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; color: var(--price);
      background: rgba(168,112,64,0.12); padding: 2px 8px; border-radius: 6px; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }

    /* ── Claude FAB ─────────────────────────────────── */
    #claude-fab {
      position: fixed;
      bottom: 76px;
      right: 24px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(140deg, var(--primary) 0%, var(--blue) 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(107,148,104,0.38);
      z-index: 30;
      transition: transform var(--t), box-shadow var(--t);
    }
    #claude-fab:hover { transform: scale(1.06); box-shadow: 0 6px 24px rgba(107,148,104,0.50); }
    #claude-fab:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    #claude-fab svg { color: #fff; }
    #claude-fab-tip {
      position: fixed;
      bottom: 138px;
      right: 24px;
      background: var(--text);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 7px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity var(--t), transform var(--t);
      z-index: 30;
      font-family: inherit;
    }
    #claude-fab:hover + #claude-fab-tip { opacity: 1; transform: translateY(0); }

    /* ── Share bar ──────────────────────────────────── */
    #share-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 8px;
      z-index: 20;
      box-shadow: 0 -1px 8px rgba(46,40,32,0.06);
    }
    #share-bar-btn {
      flex: 1;
      height: 36px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background var(--t);
      font-family: inherit;
      letter-spacing: -0.01em;
    }
    #share-bar-btn:hover { background: var(--primary-h); }
    .share-quick-btn {
      width: 36px;
      height: 36px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
      flex-shrink: 0;
      transition: all var(--t);
    }
    .share-quick-btn:hover { border-color: var(--primary); background: var(--primary-faint); color: var(--primary); transform: translateY(-1px); }

    /* ── Claude panel ───────────────────────────────── */
    #claude-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 2px solid var(--primary);
      border-radius: 18px 18px 0 0;
      padding: 20px 28px 28px;
      box-shadow: 0 -8px 32px rgba(107,148,104,0.14);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 50;
      max-height: 50vh;
      overflow-y: auto;
    }
    #claude-panel.open { transform: translateY(0); }
    .claude-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .claude-panel-title {
      font-size: 13px; font-weight: 700; color: var(--primary);
      display: flex; align-items: center; gap: 7px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .claude-close-btn {
      background: none; border: none; cursor: pointer; color: var(--text-2);
      padding: 4px; border-radius: 6px; display: flex; align-items: center;
      transition: background var(--t);
    }
    .claude-close-btn:hover { background: var(--surface-2); color: var(--text); }
    .claude-loading {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-2); font-size: 13px;
    }
    .claude-spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .claude-summary { font-size: 14px; line-height: 1.65; color: var(--text); margin-bottom: 14px; }
    .claude-insights { display: flex; flex-direction: column; gap: 7px; }
    .claude-insight {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 13px; color: var(--text); line-height: 1.5;
    }
    .claude-insight::before {
      content: '→'; color: var(--primary); font-weight: 700; flex-shrink: 0; margin-top: 1px;
    }
    .claude-error { font-size: 13px; color: var(--danger); }

    /* ── Share modal ────────────────────────────────── */
    #share-overlay {
      position: fixed; inset: 0;
      background: rgba(46,40,32,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #share-overlay.open { opacity: 1; pointer-events: all; }
    #share-modal {
      background: var(--card-bg);
      border-radius: 22px 22px 0 0;
      padding: 24px 24px 36px;
      width: 100%; max-width: 480px;
      box-shadow: 0 -12px 48px rgba(46,40,32,0.16);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    #share-overlay.open #share-modal { transform: translateY(0); }
    .share-handle {
      width: 36px; height: 4px;
      background: var(--border-2);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .share-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .share-modal-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .share-close-btn {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--surface-2); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); transition: background var(--t);
    }
    .share-close-btn:hover { background: var(--border-2); color: var(--text); }
    .share-native-btn {
      width: 100%; height: 46px; margin-bottom: 14px;
      background: var(--primary); color: #fff;
      border: none; border-radius: 12px; cursor: pointer;
      font-size: 14px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background var(--t);
      font-family: inherit; letter-spacing: -0.01em;
    }
    .share-native-btn:hover { background: var(--primary-h); }
    .share-url-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 18px;
    }
    .share-url-text {
      flex: 1; font-size: 12px; color: var(--text-2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .share-copy-btn {
      padding: 5px 13px; background: var(--primary); color: #fff;
      border: none; border-radius: 7px; font-size: 11px; font-weight: 700;
      cursor: pointer; flex-shrink: 0; transition: background var(--t);
      font-family: inherit;
    }
    .share-copy-btn:hover { background: var(--primary-h); }
    .share-copy-btn.copied { background: var(--success); }
    .share-divider {
      font-size: 10px; font-weight: 600; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.12em;
      text-align: center; margin-bottom: 14px;
    }
    .share-platforms { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .share-platform-btn {
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      padding: 14px 8px; border-radius: 14px; border: 1px solid var(--border);
      background: var(--bg); cursor: pointer; transition: all 0.12s;
      font-size: 11px; font-weight: 600; color: var(--text-2);
      font-family: inherit;
    }
    .share-platform-btn:hover {
      border-color: var(--primary); color: var(--primary);
      background: var(--primary-faint); transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }
    .share-platform-btn svg { flex-shrink: 0; }
    .share-generating {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-2); font-size: 13px; padding: 8px 0;
    }

    /* ── Toast ──────────────────────────────────────── */
    #copy-toast {
      position: fixed; bottom: 72px; left: 50%;
      transform: translateX(-50%);
      background: var(--text); color: #fff;
      padding: 9px 18px; border-radius: 10px;
      font-size: 12px; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 300;
      font-family: inherit;
    }
    #copy-toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>Compare Products</h1>
      <p id="header-sub">Loading…</p>
    </div>
    <button class="close-btn" id="close-btn" title="Close">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="filters" id="filters-bar"></div>

  <div id="main-content"></div>
  <div id="copy-toast">Link copied</div>

  <!-- Ask Claude FAB -->
  <button id="claude-fab" title="Ask Claude">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
      <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
    </svg>
  </button>
  <div id="claude-fab-tip">Ask Claude for insights</div>

  <!-- Sticky share bar -->
  <div id="share-bar">
    <button id="share-bar-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      Share this comparison
    </button>
    <!-- WhatsApp quick -->
    <button class="share-quick-btn" id="quick-wa" title="Share via WhatsApp">

    <button class="share-quick-btn" id="quick-email" title="Share via Email">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>

    <button class="share-quick-btn" id="quick-x" title="Post on X">

  <!-- Share modal -->
  <div id="share-overlay">
    <div id="share-modal">
      <div class="share-handle"></div>
      <div class="share-modal-header">
        <span class="share-modal-title">Share your haul</span>
        <button class="share-close-btn" id="share-modal-close">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="share-modal-body">
        <div class="share-generating">
          <div class="claude-spinner"></div>
          Generating link…
        </div>
      </div>
    </div>
  </div>

  <!-- Claude panel -->
  <div id="claude-panel">
    <div class="claude-panel-header">
      <span class="claude-panel-title">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
        </svg>
        Claude's Take
      </span>
      <button class="claude-close-btn" id="claude-panel-close">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="claude-panel-body">
      <div class="claude-loading">
        <div class="claude-spinner"></div>
        Analyzing your haul…
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
